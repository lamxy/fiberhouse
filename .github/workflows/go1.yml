name: build & test

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        run: go test ./... -count=1 -coverprofile=coverage.out -covermode=atomic

      - name: Report total coverage
        run: |
          go tool cover -func=coverage.out | tee coverage-summary.txt
          grep '^total:' coverage-summary.txt

  race:
    name: race
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Test with race detector
        run: go test -race ./... -count=1

  smoke:
    name: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TARGET_NAME: fhweb
      LDFLAGS: -ldflags="-X 'main.Version=v0.0.1'"
      APP_ENV_application_env: test
      APP_ENV_application_appType: web
    services:
      redis:
        image: redis:8.2.7-bookworm
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mongodb:
        image: mongo:8.0.26-noble
        ports:
          - 27037:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: admin
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mysql:
        image: mysql:8.4.10-oraclelinux9
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -proot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build example
        run: go build ${{ env.LDFLAGS }} -o "$RUNNER_TEMP/${{ env.TARGET_NAME }}" ./example_main/main.go

      - name: Start example
        run: |
          "$RUNNER_TEMP/${{ env.TARGET_NAME }}" >"$RUNNER_TEMP/${{ env.TARGET_NAME }}.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/${{ env.TARGET_NAME }}.pid"

      - name: Check HTTP path
        run: curl --fail --retry 10 --retry-delay 1 --retry-connrefused http://127.0.0.1:8080/example/hello/world

      - name: Run live integration tests
        timeout-minutes: 2
        run: go test -tags=liveintegration ./... -run 'TestLive_' -v -count=1

      - name: Print example log on failure
        if: failure()
        run: cat "$RUNNER_TEMP/${{ env.TARGET_NAME }}.log"

      - name: Stop example
        if: always()
        run: |
          if [[ -f "$RUNNER_TEMP/${{ env.TARGET_NAME }}.pid" ]]; then
            kill "$(cat "$RUNNER_TEMP/${{ env.TARGET_NAME }}.pid")" || true
          fi
